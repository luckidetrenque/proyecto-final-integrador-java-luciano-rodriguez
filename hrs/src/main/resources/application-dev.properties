# ==========================================
# CONFIG DEV - NO SUBIR A GITHUB
# ==========================================

# Base de datos Neon/PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST}/neondb?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${SERVER_PORT:8080}

spring.sql.init.mode=never

app.whitelist.emails=${WHITELIST_EMAILS:}

logging.level.com.escueladeequitacion.hrs=DEBUG
spring.output.ansi.enabled=ALWAYS

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jackson.serialization.write-dates-as-timestamps=false

# Habilitar inserción por lotes (Batch)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# Usuarios iniciales (DataInitializer)
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.coordinator.emails=${APP_COORDINATOR_EMAILS:}
app.coordinator.password=${APP_COORDINATOR_PASSWORD:}
# Configuración de Correo (Placeholder)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-correo@gmail.com
spring.mail.password=tu-contraseña-o-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
