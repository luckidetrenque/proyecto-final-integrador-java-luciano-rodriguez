# Activa el perfil según variable de entorno, por defecto usa "local"
spring.profiles.active=${SPRING_PROFILE:local}
spring.application.name=hrs

# Configuración de la base de datos
# Configuración de Conexión a Neon
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=require&channelBinding=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Driver y Dialecto para PostgreSQL 16+
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Automatización de Tablas (Crea las tablas basándose en tus clases Java)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true