services:

  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: hrs_mysql
    restart: always
    environment:
      MYSQL_DATABASE: hrs
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Persistencia de datos: aunque el contenedor se reinicie, los datos no se pierden
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tu aplicación Spring Boot
  app:
    build: .
    container_name: hrs_app
    restart: always
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILE: prod
      DB_URL: jdbc:mysql://mysql:3306/hrs?useSSL=false&serverTimezone=America%2FArgentina%2FBuenos_Aires&rewriteBatchedStatements=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      WHITELIST_EMAILS: ${WHITELIST_EMAILS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SERVER_PORT: 8080
    volumes:
      # Los uploads persisten fuera del contenedor
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data: